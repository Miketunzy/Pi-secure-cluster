services:
  web:
    image: pi-cluster-nginx
    ports:
      - "8080:80"
    container_name: web-server
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_PASSWORD: example
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
    db-data:
