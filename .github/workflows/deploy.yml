name: Build and Deploy Nginx
on:
  push:
    branches:
      - main
    paths:
      - 'docker/nginx-demo/**'
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: docker/nginx-demo
          push: true
          tags: miketunzy/pi-cluster-nginx:latest
          platforms: linux/amd64,linux/arm64

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to pi-control
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_CONTROL_HOST }}
          username: ${{ secrets.PI_CONTROL_USER }}
          key: ${{ secrets.PI_CONTROL_SSH_KEY }}
          script: |
            docker pull miketunzy/pi-cluster-nginx:latest
            docker stop web-server || true
            docker rm web-server || true
            docker run -d -p 8080:80 --name web-server miketunzy/pi-cluster-nginx:latest
