[defaults]
inventory = ~/Pi-secure-cluster/ansible/inventory/hosts
remote_user = mike-1
private_key_file = ~/.ssh/id_ed25519
host_key_checking = False
roles_path = ~/Pi-secure-cluster/ansible/roles
vault_password_file = ~/.vault_pass

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
