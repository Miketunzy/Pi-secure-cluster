---
    - name: Ensure essential packages are installed
      hosts: cluster
      become: true
      vars:
        baseline_packages:
          - curl
          - git
          - ufw
          - fail2ban
          - jq
          - tzdata
        baseline_timezone: "America/Chicago"

      tasks: 
        - name: Install essential packages
          apt:
            name: "{{ baseline_packages }}"
            state: present
            update_cache: yes

        - name: Set timezone
          timezone:
             name: "{{ baseline_timezone }}"
        - name: Deploy sshd listen address config
          copy:
            src: ../files/10-listen-tailscale.conf
            dest: /etc/ssh/sshd_config.d/10-listen-tailscale.conf
            owner: root
            group: root
            mode: '0644'
          notify: Restart sshd

      handlers:
        - name: Restart sshd
          service:
            name: ssh
            state: restarted
