---
- name: Install essential package
  apt:
    name: "{{ baseline_packages }}"
    state: present
    update_cache: yes

- name: Set timezone
  timezone:
    name: "{{ baseline_timezone }}"

- name: Deploy sshd listen address config
  template:
    src: 10-listen-tailscale.conf.j2
    dest: /etc/ssh/sshd_config.d/10-listen-tailscale.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart sshd

- name: Mask ssh.socket to prevent systemd override
  systemd:
    name: ssh.socket
    masked: yes
